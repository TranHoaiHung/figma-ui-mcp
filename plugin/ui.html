<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Figma UI MCP Bridge</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
      background: #1e1e2e; color: #cdd6f4;
      padding: 16px; width: 300px; font-size: 12px;
    }
    header { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
    header svg { flex-shrink: 0; }
    header h1 { font-size: 13px; font-weight: 600; color: #cba6f7; }
    header p  { font-size: 10px; color: #6c7086; margin-top: 1px; }

    .status-bar {
      display: flex; align-items: center; gap: 8px;
      background: #181825; border: 1px solid #313244;
      border-radius: 8px; padding: 8px 12px; margin-bottom: 12px;
    }
    .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .dot.green  { background: #a6e3a1; box-shadow: 0 0 6px #a6e3a166; }
    .dot.red    { background: #f38ba8; }
    .dot.yellow { background: #f9e2af; animation: blink 1s ease infinite; }
    @keyframes blink { 0%,100%{opacity:1}50%{opacity:.3} }
    .status-label { font-size: 11px; flex: 1; }
    .badge { font-size: 9px; padding: 2px 6px; border-radius: 4px; background: #313244; color: #6c7086; }

    .stats { display: flex; gap: 8px; margin-bottom: 12px; }
    .stat { flex: 1; background: #181825; border: 1px solid #313244; border-radius: 8px; padding: 8px; text-align: center; }
    .stat .n { font-size: 18px; font-weight: 700; color: #cdd6f4; }
    .stat .l { font-size: 9px; color: #6c7086; margin-top: 2px; }

    .log-wrap { margin-bottom: 10px; }
    .log-label { font-size: 10px; color: #6c7086; margin-bottom: 4px; }
    .log {
      background: #11111b; border: 1px solid #313244; border-radius: 8px;
      font-family: 'SF Mono', 'JetBrains Mono', 'Fira Code', monospace;
      font-size: 10px; padding: 8px; height: 150px;
      overflow-y: auto; white-space: pre-wrap; word-break: break-all; color: #585b70;
    }
    .log .ok   { color: #a6e3a1; }
    .log .err  { color: #f38ba8; }
    .log .info { color: #89b4fa; }

    .btn-row { display: flex; gap: 6px; }
    button {
      flex: 1; padding: 7px; border-radius: 6px; font-size: 11px; font-weight: 500;
      cursor: pointer; border: 1px solid #313244; background: #181825; color: #cdd6f4;
      transition: background .15s;
    }
    button:hover { background: #313244; }
    button.primary { background: #cba6f7; color: #1e1e2e; border-color: transparent; }
    button.primary:hover { background: #b794e8; }
  </style>
</head>
<body>
  <header>
    <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
      <rect width="28" height="28" rx="8" fill="#313244"/>
      <rect x="7" y="7" width="6" height="9" rx="3" fill="#cba6f7"/>
      <rect x="15" y="7" width="6" height="6" rx="3" fill="#89b4fa"/>
      <rect x="15" y="15" width="6" height="6" rx="3" fill="#a6e3a1"/>
      <rect x="7" y="18" width="6" height="3" rx="1.5" fill="#f9e2af"/>
    </svg>
    <div>
      <h1>Figma UI MCP</h1>
      <p>Bidirectional design bridge · port 38451</p>
    </div>
  </header>

  <div class="status-bar">
    <div class="dot yellow" id="dot"></div>
    <span class="status-label" id="status-text">Connecting...</span>
    <span class="badge" id="mode-badge">—</span>
  </div>

  <div class="stats">
    <div class="stat"><div class="n" id="write-count">0</div><div class="l">Writes</div></div>
    <div class="stat"><div class="n" id="read-count">0</div><div class="l">Reads</div></div>
    <div class="stat"><div class="n" id="err-count">0</div><div class="l">Errors</div></div>
  </div>

  <div class="log-wrap">
    <div class="log-label">Activity log</div>
    <div class="log" id="log"></div>
  </div>

  <div class="btn-row">
    <button onclick="clearLog()">Clear log</button>
    <button class="primary" onclick="reconnect()">Reconnect</button>
  </div>

  <script>
    var BRIDGE  = "http://localhost:38451";
    var POLL_MS = 900;

    // In-memory counters (no storage APIs — Figma runs in data: URL iframe)
    var writeCount = 0, readCount = 0, errCount = 0;
    var polling = true;

    var logEl    = document.getElementById("log");
    var dotEl    = document.getElementById("dot");
    var statusEl = document.getElementById("status-text");
    var modeEl   = document.getElementById("mode-badge");

    function setStatus(state, text, mode) {
      dotEl.className = "dot " + state;
      statusEl.textContent = text;
      if (mode) modeEl.textContent = mode;
    }

    function log(msg, cls) {
      var line = document.createElement("div");
      if (cls) line.className = cls;
      var ts = new Date().toLocaleTimeString("en", { hour12: false });
      line.textContent = ts + "  " + msg;
      logEl.appendChild(line);
      logEl.scrollTop = logEl.scrollHeight;
      while (logEl.children.length > 300) logEl.removeChild(logEl.firstChild);
    }

    function clearLog() { logEl.innerHTML = ""; }

    function sleep(ms) { return new Promise(function(r) { setTimeout(r, ms); }); }

    async function sendResponse(id, success, data, error) {
      try {
        await fetch(BRIDGE + "/response", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            id: id,
            success: success,
            data: data !== undefined ? data : null,
            error: error !== undefined ? error : null
          })
        });
      } catch (e) {
        log("Response failed: " + e.message, "err");
      }
    }

    function dispatchToMain(req) {
      parent.postMessage({ pluginMessage: req }, "*");
    }

    async function poll() {
      while (polling) {
        try {
          var res = await fetch(BRIDGE + "/poll", { signal: AbortSignal.timeout(3000) });
          if (!res.ok) { setStatus("yellow", "Bridge not responding"); await sleep(POLL_MS); continue; }

          var body = await res.json();
          var reqs = body.requests;
          setStatus("green", reqs.length ? reqs.length + " cmd(s)" : "Connected — idle", body.mode || "ready");

          for (var i = 0; i < reqs.length; i++) {
            var req = reqs[i];
            var isRead = ["get_selection","get_design","get_page_nodes","screenshot","to_code"].indexOf(req.operation) >= 0;
            log("→ " + req.operation, isRead ? "info" : "ok");
            dispatchToMain(req);
          }
        } catch (e) {
          setStatus("red", "Cannot reach :38451 — is MCP server running?");
          log("Poll: " + e.message, "err");
        }
        await sleep(POLL_MS);
      }
    }

    function reconnect() {
      polling = false;
      setStatus("yellow", "Reconnecting...");
      setTimeout(function() { polling = true; poll(); }, 300);
    }

    // Messages from code.js main thread
    window.onmessage = async function(event) {
      var msg = event.data.pluginMessage;
      if (!msg) return;
      var isRead = ["get_selection","get_design","get_page_nodes","screenshot","to_code"].indexOf(msg.operation) >= 0;
      if (msg.success) {
        if (isRead) { readCount++; document.getElementById("read-count").textContent = readCount; }
        else        { writeCount++; document.getElementById("write-count").textContent = writeCount; }
        log("✓ " + (msg.id ? msg.id.slice(-6) : "?"), "ok");
      } else {
        errCount++;
        document.getElementById("err-count").textContent = errCount;
        log("✗ " + (msg.id ? msg.id.slice(-6) : "?") + ": " + msg.error, "err");
      }
      await sendResponse(msg.id, msg.success, msg.data, msg.error);
    };

    // Auto-start polling immediately — no storage needed
    poll();
  </script>
</body>
</html>
